<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тварини</title>
</head>
<body>

<h1>Список тварин</h1>

<ul id="animalList"></ul>

<script>

fetch("animals.json")
    .then(response => response.text())
    .then(text => {

        const data = JSON.parse(text);

        const list = document.getElementById("animalList");

        data.forEach(animal => {

            const li = document.createElement("li");

            li.innerHTML = `
                <h3>${animal.name}</h3>
                <p>Тип: ${animal.type}</p>
                <img src="${animal.photo}" width="200">
            `;

            list.appendChild(li);
        });

    })
    .catch(error => console.log(error));

</script>

</body>
</html>
